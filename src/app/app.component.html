<header class="navbar-wrapper">
  <div class="container">
    <nav class="navbar glass-panel">
      
      <a routerLink="/" class="logo navbar-left">
        <span class="logo-icon">🔥</span> <span class="text-gradient">CharityBites</span>
      </a>

      <div class="navbar-center nav-links">
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">{{ lang.t.NAV.HOME }}</a>
        <a routerLink="/menu" routerLinkActive="active">{{ lang.t.NAV.MENU }}</a>
      </div>

      <div class="navbar-right header-actions">
        <a routerLink="/cart" routerLinkActive="active" class="cart-link icon-btn" [title]="lang.t.NAV.CART">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="21" r="1"></circle>
            <circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
          </svg>
          <span class="cart-badge badge-top pulse-badge" *ngIf="cartItemCount > 0">{{ cartItemCount }}</span>
        </a>
        <button (click)="lang.toggle()" class="lang-btn icon-btn-pill">{{ lang.currentLang() === 'vi' ? '🇻🇳 VN' : '🇬🇧 EN' }}</button>
      </div>

    </nav>
  </div>
</header>

<main class="main-content">
  <router-outlet></router-outlet>
</main>

<footer class="footer">
  <div class="container">
    <div class="footer-content">
      <p class="footer-brand"><span class="logo-icon">🔥</span> <span class="text-gradient">CharityBites</span></p>
      <p>{{ lang.t.HOME.FOOTER_TEXT }}</p>
    </div>
  </div>
</footer>

<button class="floating-fab extended-fab" (click)="openCreateOrderModal()">
  <span>✨</span> <span>{{ lang.t.CREATE_ORDER.BTN }}</span>
</button>

<app-create-order-modal *ngIf="isCreateOrderModalOpen" (close)="closeCreateOrderModal()"></app-create-order-modal>
