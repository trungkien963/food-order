<div class="dish-card" *ngIf="dish">
  <div class="dish-image" [style.backgroundImage]="'url(' + dish.imageUrl + ')'">
    <div class="badge-container" *ngIf="dish.type">
      <span class="badge">{{ dish.type }}</span>
    </div>
  </div>
  
  <div class="dish-body">
    <div class="team-badge">
       {{ dish.teamName }} 🌟
    </div>
    
    <h3 class="dish-title">{{ dish.dishName }}</h3>
    
    <div class="dish-features">
      <div class="feature-item">
         <span class="dot"></span> <span class="price">{{ dish.price }}</span>
      </div>
      <div class="feature-item">
         <span class="dot"></span> <span>{{ dish.dateAvailable }}</span>
      </div>
    </div>
    
    <div class="description-box">
      <p class="description" [class.expanded]="showFullDescription">
        {{ dish.description }}
      </p>
      <button 
        class="btn-link" 
        (click)="showFullDescription = !showFullDescription" 
        *ngIf="isTruncatable">
        {{ showFullDescription ? '− Thu gọn' : '+ Chi tiết' }}
      </button>
    </div>
    
    <button class="order-btn" (click)="order.emit(dish)">
       Thưởng thức
    </button>
  </div>
</div>
