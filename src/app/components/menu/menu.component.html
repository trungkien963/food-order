<div class="menu-layout animate-fade-in-up stagger-1">
  <!-- HERO SECTION -->
  <section class="hero zigzag-wrapper">
    <div class="hero-content">
      <div class="badge-pill mb-4">{{ lang.t.MENU.BADGE }}</div>
      <h1 class="hero-title">{{ lang.t.MENU.TITLE_1 }} <br> <span class="highlight-text">{{ lang.t.MENU.TITLE_2 }}</span></h1>
      <p class="hero-subtitle">
        {{ lang.t.MENU.SUBTITLE }}
      </p>
    </div>

    <!-- Transparent image overlapping wave -->
    <div class="hero-img-container">
       <img src="assets/images/com_tam.png" alt="Cơm Tấm" class="hero-main-img-transparent" />
       
       <!-- Floaters -->
       <img src="assets/images/stunning_pho.png" alt="Phở" class="floater floater-pho" />
    </div>
    
    <!-- Smooth Wave Bottom -->
    <div class="wave-bottom"></div>
  </section>
  
  <section class="menu-content">
    <div class="menu-grid" *ngIf="dishes$ | async as dishes; else loading">
      <app-dish-card 
        *ngFor="let dish of dishes" 
        [dish]="dish" 
        (order)="onOrder($event)">
      </app-dish-card>
    </div>
    
    <ng-template #loading>
      <div class="loading-state">
        <div class="spinner"></div>
        <p>{{ lang.t.MENU.LOADING }}</p>
      </div>
    </ng-template>
  </section>
</div>
