<div class="menu-layout animate-fade-in-up stagger-1">
  <section class="menu-header-section">
    <!-- Floating Food Plates -->
    <img src="assets/images/stunning_pho.png" alt="Phở" class="floater-dish plate-left" />
    <img src="assets/images/cat_com_tam_1774219573802.png" alt="Cơm Tấm" class="floater-dish plate-right" />
    
    <div class="header-content-wrapper">
      <div class="badge-pill">🤤 Bụng Đói Khách Kêu</div>
      <h2 class="quirky-title">Thực đơn <br> <span class="highlight-text">quyên góp</span></h2>
      <p class="section-subtitle">Hãy chọn những món ăn bạn yêu thích. Mọi đóng góp đều vô cùng trân quý và sẽ được gửi vào Quỹ Wecare.</p>
    </div>
    
    <!-- Torn paper edge transition -->
    <div class="torn-paper-bottom"></div>
  </section>
  
  <section class="menu-content">
    <div class="menu-grid" *ngIf="dishes$ | async as dishes; else loading">
      <app-dish-card 
        *ngFor="let dish of dishes" 
        [dish]="dish" 
        (order)="onOrder($event)">
      </app-dish-card>
    </div>
    
    <ng-template #loading>
      <div class="loading-state">
        <div class="spinner"></div>
        <p>Đang chuẩn bị thức ăn...</p>
      </div>
    </ng-template>
  </section>
</div>
