<div class="modal-backdrop fadeIn" (click)="onClose()">
  <div class="modal-container slideUp" (click)="$event.stopPropagation()">

    <!-- HEADER -->
    <div class="modal-header">
      <h2 *ngIf="!submitSuccess && !submitError">{{ lang.t.CREATE_ORDER.TITLE }}</h2>
      <h2 *ngIf="submitSuccess" style="color: var(--success);">{{ lang.t.CREATE_ORDER.SUCCESS_HDR }}</h2>
      <h2 *ngIf="submitError" style="color: var(--error);">{{ lang.t.CREATE_ORDER.ERROR_HDR }}</h2>
      <button class="close-btn" (click)="onClose()" [disabled]="isSubmitting">&times;</button>
    </div>

    <!-- SUCCESS VIEW -->
    <div class="modal-body success-view" *ngIf="submitSuccess">
      <div class="success-icon">✓</div>
      <h3>{{ lang.t.CREATE_ORDER.SUCCESS_MSG }}</h3>
      <p [innerHTML]="lang.t.CREATE_ORDER.SUCCESS_DETAIL"></p>
      <button class="btn btn-primary mt-4" (click)="onClose()">{{ lang.t.CREATE_ORDER.BTN_CLOSE }}</button>
    </div>

    <!-- ERROR VIEW -->
    <div class="modal-body error-view" *ngIf="submitError">
      <div class="error-icon">✕</div>
      <h3>{{ lang.t.CREATE_ORDER.ERROR_MSG }}</h3>
      <p class="error-detail">{{ submitError }}</p>
      <button class="btn btn-outline mt-4" (click)="submitError = ''">{{ lang.t.CREATE_ORDER.BTN_RETRY }}</button>
    </div>

    <!-- FORM VIEW -->
    <form [formGroup]="orderForm" (ngSubmit)="onSubmit()" class="modal-body" *ngIf="!submitSuccess && !submitError">
      <fieldset [disabled]="isSubmitting" class="form-fieldset">
        <!-- Tên nhóm -->
        <div class="input-group">
          <label class="input-label">{{ lang.t.CREATE_ORDER.GROUP_NAME }} <span class="required">*</span></label>
          <input type="text" formControlName="groupName" class="input-field"
            [class.input-error]="orderForm.get('groupName')?.invalid && orderForm.get('groupName')?.touched">
        </div>

        <!-- Mail của leader -->
        <div class="input-group">
          <label class="input-label">{{ lang.t.CREATE_ORDER.LEADER_EMAIL }} <span class="required">*</span></label>
          <input type="email" formControlName="leaderEmail" class="input-field"
            [class.input-error]="orderForm.get('leaderEmail')?.invalid && orderForm.get('leaderEmail')?.touched">
        </div>

        <!-- Tên món ăn -->
        <div class="input-group">
          <label class="input-label">{{ lang.t.CREATE_ORDER.DISH_NAME }} <span class="required">*</span></label>
          <input type="text" formControlName="dishName" class="input-field"
            [class.input-error]="orderForm.get('dishName')?.invalid && orderForm.get('dishName')?.touched">
        </div>

        <!-- Mô tả -->
        <div class="input-group">
          <label class="input-label">{{ lang.t.CREATE_ORDER.DESC }}</label>
          <textarea formControlName="description" class="input-field textarea"></textarea>
        </div>

        <!-- Ngày giao hàng & Loại thức ăn -->
        <div class="row-inputs">
          <div class="input-group flex-1">
            <label class="input-label">{{ lang.t.CREATE_ORDER.DATE }} <span class="required">*</span></label>
            <input type="date" formControlName="dateAvailable" class="input-field"
              [class.input-error]="orderForm.get('dateAvailable')?.invalid && orderForm.get('dateAvailable')?.touched">
          </div>
          <div class="input-group flex-1">
            <label class="input-label">{{ lang.t.CREATE_ORDER.TYPE }} <span class="required">*</span></label>
            <select formControlName="foodType" class="input-field"
              [class.input-error]="orderForm.get('foodType')?.invalid && orderForm.get('foodType')?.touched">
              <option value="" disabled>{{ lang.t.CREATE_ORDER.SELECT_TYPE }}</option>
              <option *ngFor="let type of dishTypes" [value]="type">{{ type }}</option>
            </select>
          </div>
        </div>

        <!-- Giá tiền -->
        <div class="input-group">
          <label class="input-label">{{ lang.t.CREATE_ORDER.PRICE }} (VND) <span class="required">*</span></label>
          <input type="number" formControlName="price" class="input-field" min="0"
            [class.input-error]="orderForm.get('price')?.invalid && orderForm.get('price')?.touched">
        </div>

        <!-- Email thành viên -->
        <div class="input-group">
          <label class="input-label">{{ lang.t.CREATE_ORDER.EMAILS }} <span class="required">*</span></label>
          <div class="tags-container">
            <span class="tag" *ngFor="let email of memberEmails; let i = index">
              {{ email }}
              <button class="remove-tag" (click)="removeEmail(i)">&times;</button>
            </span>
            <input type="text" id="memberEmailInput" class="tag-input" (input)="onEmailInput($event)"
              (keydown.enter)="addEmail($event)" placeholder="abc.xyz@mantu.com">
          </div>
          <span class="error-text" *ngIf="emailError">{{ emailError }}</span>
        </div>
      </fieldset>

      <div class="modal-footer" style="padding: 1.5rem 0 0 0; border: none;">
        <button type="button" class="btn btn-outline" (click)="onClose()" [disabled]="isSubmitting">{{ lang.t.CREATE_ORDER.CANCEL }}</button>
        <button type="submit" class="btn btn-primary" [disabled]="isSubmitting">
          {{ isSubmitting ? lang.t.CREATE_ORDER.BTN_LOADING : lang.t.CREATE_ORDER.SUBMIT }}
        </button>
      </div>
    </form>

  </div>
</div>
